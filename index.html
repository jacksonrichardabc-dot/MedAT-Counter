<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAT Study Tracker & Reader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="authContainer" class="container">
        <h1 id="authTitle">🔒 Login</h1>
        <form id="authForm">
            <input type="email" id="authEmail" placeholder="Email Address" required>
            <input type="password" id="authPassword" placeholder="Password" required>
            <button type="submit" id="authBtn" class="yellow-btn">Login</button>
        </form>
        <p id="toggleAuthText">Don't have an account? <span id="switchAuth">Sign Up</span></p>
    </div>

    <div id="appContainer" class="container" style="display: none;">
        
        <div class="header-inline">
            <h1 id="welcomeText">👋 Hello!</h1>
            <div class="header-buttons">
                <button id="homeBtn" class="nav-btn" style="display: none;">🏠 Back to Menu</button>
                <button id="logoutBtn" class="danger-btn">Logout</button>
            </div>
        </div>
        
        <div id="homeView" class="menu-grid">
            <button id="navToDataBtn" class="big-btn yellow-btn">📝 Add Data</button>
            <button id="navToGraphBtn" class="big-btn yellow-btn">📊 View Question Graphs</button>
            <button id="navToPercentBtn" class="big-btn yellow-btn">💯 Percent Calculation</button>
            <button id="navToReader1Btn" class="big-btn yellow-btn">📖 Speed Reader (Highlight Text)</button>
            <button id="navToReader2Btn" class="big-btn yellow-btn">👁️ Speed Reader (Single Word)</button>
            <button id="navToTestBtn" class="big-btn yellow-btn">🧠 Test Center (Genetics)</button>
        </div>

        <div id="dataView" style="display: none;">
            <form id="studyForm">
                <input type="date" id="dateInput" required>
                <div class="select-group">
                    <select id="categoryInput" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="BMS">BMS</option>
                        <option value="TV">TV</option>
                        <option value="KFF">KFF</option>
                        <option value="SEK">SEK</option>
                    </select>
                    <select id="subCategoryInput" required disabled>
                        <option value="" disabled selected>Section</option>
                    </select>
                </div>
                <input type="number" id="questionInput" placeholder="Questions Solved" required>
                <button type="submit" class="yellow-btn">Submit Data</button>
            </form>

            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Score / Max</th>
                            <th>Percentage / Max</th>
                            <th style="width: 50px; text-align: center;">Del</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="graphView" style="display: none;">
            <div class="filter-card">
                <h3>🔍 Question Graph Filter</h3>
                <div class="filter-group">
                    <select id="graphCatSelect">
                        <option value="TUM">Total Exam Score</option>
                        <option value="BMS">BMS Category</option>
                        <option value="TV">TV Category</option>
                        <option value="KFF">KFF Category</option>
                        <option value="SEK">SEK Category</option>
                    </select>
                    <select id="graphSubSelect" disabled>
                        <option value="TUM">Total of All Sections</option>
                    </select>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div id="percentView" style="display: none;">
            <div class="filter-card">
                <h3>💯 Percentage Filter</h3>
                <div class="filter-group">
                    <select id="percentCatSelect">
                        <option value="TUM">Total Exam Percentage</option>
                        <option value="BMS">BMS Category</option>
                        <option value="TV">TV Category</option>
                        <option value="KFF">KFF Category</option>
                        <option value="SEK">SEK Category</option>
                    </select>
                    <select id="percentSubSelect" disabled>
                        <option value="TUM">Total of All Sections</option>
                    </select>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="percentChart"></canvas>
            </div>
        </div>

        <div id="reader1View" style="display: none;">
            <div class="filter-card">
                <h3>📖 Highlight Speed Reader</h3>
                
                <div class="library-section">
                    <div class="select-group">
                        <select id="r1LibrarySelect">
                            <option value="" disabled selected>Load from Library...</option>
                        </select>
                        <button id="r1LibraryLoadBtn" class="nav-btn" type="button">Load</button>
                        <button id="r1LibraryDelBtn" class="danger-btn" type="button" style="padding:12px;">🗑️</button>
                    </div>
                </div>

                <textarea id="r1TextInput" rows="4" placeholder="Paste the text you want to read here..."></textarea>
                
                <div class="select-group" style="margin-top: 10px;">
                    <input type="text" id="r1SaveTitle" placeholder="Enter text title to save..." style="width:70%;">
                    <button id="r1SaveBtn" class="nav-btn" type="button" style="width:30%; font-size:14px;">Save Text</button>
                </div>

                <button id="r1LoadBtn" class="yellow-btn" style="width: 100%; margin-top: 15px;">Prepare Text for Reading</button>
                
                <div class="reader-controls" style="margin-top: 15px;">
                    <div class="speed-slider">
                        <label>Speed: <span id="r1WpmValue">300</span> WPM</label>
                        <input type="range" id="r1Speed" min="100" max="1000" step="20" value="300">
                    </div>
                    <div class="playback-controls">
                        <button id="r1Prev" class="nav-btn">⏪ -10</button>
                        <button id="r1Play" class="yellow-btn">▶️ Play</button>
                        <button id="r1Next" class="nav-btn">⏩ +10</button>
                    </div>
                </div>
            </div>
            <div id="r1DisplayArea" class="reader-box highlight-box">
                <p style="color:#999; text-align:center; margin-top:50px;">Text will appear here...</p>
            </div>
        </div>

        <div id="reader2View" style="display: none;">
            <div class="filter-card">
                <h3>👁️ Single Word Speed Reader</h3>
                
                <div class="library-section">
                    <div class="select-group">
                        <select id="r2LibrarySelect">
                            <option value="" disabled selected>Load from Library...</option>
                        </select>
                        <button id="r2LibraryLoadBtn" class="nav-btn" type="button">Load</button>
                        <button id="r2LibraryDelBtn" class="danger-btn" type="button" style="padding:12px;">🗑️</button>
                    </div>
                </div>

                <textarea id="r2TextInput" rows="4" placeholder="Paste the text you want to read here..."></textarea>
                
                <div class="select-group" style="margin-top: 10px;">
                    <input type="text" id="r2SaveTitle" placeholder="Enter text title to save..." style="width:70%;">
                    <button id="r2SaveBtn" class="nav-btn" type="button" style="width:30%; font-size:14px;">Save Text</button>
                </div>

                <button id="r2LoadBtn" class="yellow-btn" style="width: 100%; margin-top: 15px;">Prepare Text for Reading</button>
                
                <div class="reader-controls" style="margin-top: 15px;">
                    <div class="speed-slider">
                        <label>Speed: <span id="r2WpmValue">300</span> WPM</label>
                        <input type="range" id="r2Speed" min="100" max="1000" step="20" value="300">
                    </div>
                    <div class="playback-controls">
                        <button id="r2Prev" class="nav-btn">⏪ -10</button>
                        <button id="r2Play" class="yellow-btn">▶️ Play</button>
                        <button id="r2Next" class="nav-btn">⏩ +10</button>
                    </div>
                </div>
            </div>
            <div class="reader-box single-word-box">
                <span id="r2DisplayArea">Ready</span>
            </div>
        </div>

        <div id="testView" style="display: none;">
            <div class="filter-card">
                <h3>🧠 Genetics Interactive Test</h3>
                
                <div class="test-controls select-group" id="testSetupArea">
                <input type="number" id="testStartQ" placeholder="Başlangıç (Örn: 1)" min="1" value="1" style="width: 35%;">
                <input type="number" id="testEndQ" placeholder="Bitiş (Örn: 60)" min="1" value="60" style="width: 35%;">
                <button id="startTestBtn" class="yellow-btn" style="width: 30%;">Start Test</button>
                </div>

                <div id="testActiveArea" style="display: none; margin-top: 20px;">
                    <div class="header-inline" style="margin-bottom: 15px; border-bottom: none; padding-bottom: 0;">
                        <h4 id="questionCounterText" style="color: #555;">Question 1 / 5</h4>
                        <div style="font-weight: bold; font-size: 16px;">
                            <span style="color: #28a745;">✔️ <span id="correctScore">0</span></span> | 
                            <span style="color: #dc3545;">❌ <span id="wrongScore">0</span></span>
                        </div>
                    </div>

                    <div class="reader-box" style="margin-top: 0; padding: 25px;">
                        <h3 id="questionTitle" style="margin-bottom: 20px; font-size: 18px; line-height: 1.5; color: #2c3e50;"></h3>
                        <div id="optionsContainer" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
                            </div>
                        
                        <div id="feedbackBox" style="display: none; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 15px;">
                            </div>

                        <div style="display: flex; gap: 10px;">
                            <button id="submitAnswerBtn" class="yellow-btn" style="flex-grow: 1;">Check Answer</button>
                            <button id="nextQuestionBtn" class="nav-btn" style="display: none; flex-grow: 1;">Next Question ➡️</button>
                        </div>
                    </div>
                    
                    <button id="resetTestBtn" class="danger-btn" style="width: 100%; margin-top: 20px;">🛑 End & Reset Test</button>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
